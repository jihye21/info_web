<!DOCTYPE html>
<html>
<head>
<div class="container">
  <img src="background.png" class="bg" id="bgImage"/>
  <button class="overlay-button" id="btn1" onclick="location.href='https://remedihc.com/en'"></button>
  <button class="small-button" id="btn2" onclick="location.href='https://remedihc.com/en/product/ka6'"></button>
  <button class="small-button" id="btn3" onclick="location.href='https://remedihc.com/en/product/t100'"></button>
  <button class="downloadBtn" id="downloadBtn"></button>
</div>



<script>
document.getElementById("downloadBtn").addEventListener("click", function() {
  const link = document.createElement("a");
  link.href = "csForm.png";   // 다운로드할 파일 경로
  link.download = "csForm.png"; // 저장될 파일 이름
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});
</script>

<style>
body {
  margin: 0;
}

.container {
  position: relative;
  width: 100%;
}

.bg {
  width: 100%;
  height: auto;
  display: block;
}

.overlay-button {
  position: absolute;
  top: 10%;
  left: 50%;
  transform: translate(-50%, -50%);
  background-color: transparent;
  border: 2px solid white;
  color: white;
  width: 15%;   /* 가로 크기 */
  height: 2%;   /* 세로 크기 */
  cursor: pointer;
}

.small-button {
  position: absolute;
  top: 10%;
  left: 50%;
  transform: translate(-50%, -50%);
  background-color: transparent;
  border: 2px solid white;
  color: white;
  width: 9%;   /* 가로 크기 */
  height: 1.3%;   /* 세로 크기 */
  cursor: pointer;
}

.downloadBtn{
  position: absolute;
  transform: translate(-50%, -50%);
  background-color: transparent;
  border: 2px solid white;
  color: white;
  width: 12%;   /* 가로 크기 */
  height: 1.3%;   /* 세로 크기 */
  cursor: pointer;
}
</style>
<script>
const img = document.getElementById("bgImage");

// 각 버튼 + 좌표
const buttons = [
  { el: document.getElementById("btn1"), x: 305, y: 590 },
  { el: document.getElementById("btn2"), x: 1480, y: 967 },
  { el: document.getElementById("btn3"), x: 445, y: 2042 },
  { el: document.getElementById("downloadBtn"), x: 468, y: 2580 },
];

function updateButtons() {
  const rect = img.getBoundingClientRect();

  buttons.forEach(btn => {
    const left = (btn.x / img.naturalWidth) * rect.width;
    const top  = (btn.y / img.naturalHeight) * rect.height;

    btn.el.style.left = left + "px";
    btn.el.style.top  = top + "px";
  });
}

img.onload = updateButtons;
window.addEventListener("resize", updateButtons);
</script>
</body>
</html>
