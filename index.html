<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REMEDI Clone</title>

<link rel="stylesheet" href="style.css">

<!-- GSAP for animations -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>

<body>

<header class="header">
  <div class="logo">REMEDI</div>
  <nav>
    <a href="#">HOME</a>
    <a href="#">PRODUCTS</a>
    <a href="#">R&D</a>
    <a href="#">NEWS</a>
    <a href="#">CONTACT</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="slide active" style="background-image:url('assets/hero1.jpg')"></div>
  <div class="slide" style="background-image:url('assets/hero2.jpg')"></div>

  <div class="hero-text">
    <h1>Revolutionary<br>X-ray Technology</h1>
    <p>Ultra portable imaging solution</p>
  </div>
</section>

<!-- USECASE -->
<section class="usecase">
  <div class="card">TB Screening</div>
  <div class="card">Emergency</div>
  <div class="card">Healthcare</div>
</section>

<!-- PRODUCTS -->
<section class="products">
  <h2>Products</h2>
  <div class="grid">
    <div class="item">
      <img src="assets/product1.jpg">
      <h3>REMEX-KA6</h3>
    </div>
    <div class="item">
      <img src="assets/product2.jpg">
      <h3>X-ray Tube</h3>
    </div>
    <div class="item">
      <img src="assets/product3.jpg">
      <h3>Dental Camera</h3>
    </div>
  </div>
</section>

<!-- FEATURE -->
<section class="feature">
  <div>LOW DOSE</div>
  <div>LIGHT WEIGHT</div>
  <div>LOW COST</div>
</section>

<!-- NEWS -->
<section class="news">
  <h2>News</h2>
  <div class="list">
    <div>Global healthcare expansion</div>
    <div>New product launch</div>
    <div>Innovation award</div>
  </div>
</section>

<footer>© REMEDI</footer>

<script src="script.js"></script>
</body>
</html>
