<!DOCTYPE html>
<html>
<head>
<div class="container">
  <img src="background.png" class="bg" />
  <button class="overlay-button">클릭</button>
  <button class="downloadBtn" id="downloadBtn">다운로드</button>
</div>



<script>
document.getElementById("downloadBtn").addEventListener("click", function() {
  const link = document.createElement("a");
  link.href = "csForm.png";   // 다운로드할 파일 경로
  link.download = "csForm.png"; // 저장될 파일 이름
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});
</script>

<style>
body {
  margin: 0;
}

.container {
  position: relative;
  width: 100%;
}

.bg {
  width: 100%;
  height: auto;
  display: block;
}

.overlay-button {
  position: absolute;
  top: 10%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.downloadBtn{
  position: absolute;
  top: 73%;
  left: 20%;
  transform: translate(-50%, -50%);

  background-color: transparent;  /* 투명 */
  border: 2px solid white;        /* 테두리만 표시 */

  width: 400px;   /* 가로 크기 */
  height: 60px;   /* 세로 크기 */
}
</style>

</body>
</html>
