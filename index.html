<!DOCTYPE html>
<html>
<head>
<div class="container">
  <img src="background.png" class="bg" />
  <button class="overlay-button">클릭</button>
</div>

<button class="overlay-button" id="downloadBtn">다운로드</button>

<script>
document.getElementById("downloadBtn").addEventListener("click", function() {
  const link = document.createElement("a");
  link.href = "sample.pdf";   // 다운로드할 파일 경로
  link.download = "myfile.pdf"; // 저장될 파일 이름
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});
</script>

<style>
body {
  margin: 0;
}

.container {
  position: relative;
  width: 100%;
}

.bg {
  width: 100%;
  height: auto;
  display: block;
}

.overlay-button {
  position: absolute;
  top: 10%;
  left: 50%;
  transform: translate(-50%, -50%);
}
</style>

</body>
</html>
